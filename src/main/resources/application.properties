spring.application.name=federatedsearch

# Server Configuration (use PORT env variable for cloud deployment)
server.port=${PORT:8080}

# Logging Configuration
logging.level.com.example.federatedsearch=INFO
logging.level.org.springframework.web=INFO

# API Configuration (for external services)
# YouTube API Key (optional - app works without it using scraping)
youtube.api.key=${YOUTUBE_API_KEY:}

# Application Settings
app.search.default-max-results=20
