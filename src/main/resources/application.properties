spring.application.name=federatedsearch

# Server Configuration (0 = random free port)
server.port=0

# Logging Configuration
logging.level.com.example.federatedsearch=DEBUG
logging.level.org.springframework.web=INFO

# API Configuration (for external services)
# YouTube API Key (replace with actual key in production)
youtube.api.key=YOUR_YOUTUBE_API_KEY

# Web Search API Configuration
web.search.api.url=https://api.example.com/search
web.search.api.key=YOUR_WEB_SEARCH_API_KEY

# Application Settings
app.search.default-max-results=20
app.search.enable-caching=true
